---
# SealedSecret — Grafana admin credentials
# Encrypted with cluster sealed-secrets controller; safe to commit to git.
# To re-seal with a new password:
#   kubectl create secret generic grafana-admin \
#     --namespace monitoring \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password=<new-password> \
#     --dry-run=client -o yaml \
#   | kubeseal --cert sealed-secret.pub --scope strict --format yaml \
#   > manifests/grafana-admin-sealedsecret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: grafana-admin
  namespace: monitoring
spec:
  encryptedData:
    admin-password: 
    admin-user: 
  template:
    metadata:
      creationTimestamp: null
      name: grafana-admin
      namespace: monitoring
