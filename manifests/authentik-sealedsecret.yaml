---
# SealedSecret — authentik OAuth2 credentials
# Encrypted with cluster sealed-secrets controller; safe to commit to git.
# To re-seal (e.g. after rotating the Authentik client secret):
#   kubectl create secret generic authentik \
#     --namespace monitoring \
#     --from-literal=client_id=<id> \
#     --from-literal=client_secret=<secret> \
#     --dry-run=client -o yaml \
#   | kubeseal --cert sealed-secret.pub --scope strict --format yaml \
#   > manifests/authentik-sealedsecret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: authentik
  namespace: monitoring
spec:
  encryptedData:
    client_id: 
    client_secret: 
  template:
    metadata:
      creationTimestamp: null
      name: authentik
      namespace: monitoring
