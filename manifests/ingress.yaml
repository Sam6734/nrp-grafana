# =============================================================================
# Grafana DEV — Kubernetes Ingress (HAProxy)
#
# Hostname: grafana-dev.nrp.nautilus.io
# TLS is terminated at the HAProxy ingress controller (no secretName required).
# Backend service: grafana-dev (ClusterIP, port 80) — matches fullnameOverride.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-dev
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: haproxy
    # Increase proxy timeouts to handle slow Grafana dashboard loads.
    haproxy-ingress.github.io/timeout-client: "60s"
    haproxy-ingress.github.io/timeout-connect: "5s"
    haproxy-ingress.github.io/timeout-server: "60s"
    # Needed for OAuth redirect flows.
    haproxy-ingress.github.io/proxy-body-size: "5m"
spec:
  rules:
    - host: grafana-dev.nrp.nautilus.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # Must match fullnameOverride in values.yaml.
                name: grafana-dev
                port:
                  number: 80
  tls:
    - hosts:
        - grafana-dev.nrp.nautilus.io
      # No secretName = HAProxy ingress controller uses its own wildcard cert.
      # To use a custom cert via cert-manager, uncomment and set secretName:
      # secretName: grafana-dev-tls
