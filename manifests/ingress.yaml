apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-dev
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: haproxy
spec:
  rules:
    - host: grafana-dev.nrp-nautilus.io
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: grafana-dev
                port:
                  number: 80
  tls:
    - hosts:
        - grafana-dev.nrp-nautilus.io
