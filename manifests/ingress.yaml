# =============================================================================
# Grafana DEV — HTTPRoute (Gateway API)
#
# Gateway:  ingress.haproxy  (sectionName: https, from: All namespaces)
# Hostname: grafana-dev.nrp-nautilus.io
# TLS:      terminated at the gateway (cert: gw-nrp-nautilus)
# Backend:  grafana-dev service in monitoring namespace (port 80)
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-dev
  namespace: monitoring
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ingress
      namespace: haproxy
      sectionName: https
  hostnames:
    - grafana-dev.nrp-nautilus.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: grafana-dev
          namespace: monitoring
          port: 80
          weight: 1
