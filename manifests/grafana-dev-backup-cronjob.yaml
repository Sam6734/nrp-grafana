apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-grafana-dev
  namespace: monitoring
spec:
  schedule: "0 10 * * *"
  concurrencyPolicy: Forbid
  suspend: false
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          restartPolicy: Never
          terminationGracePeriodSeconds: 30

          # Must land on the same node as grafana-dev so the RWO PVC can be
          # mounted read-only alongside the running Grafana pod.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: grafana
                      app.kubernetes.io/instance: grafana-dev
                  topologyKey: kubernetes.io/hostname

          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-dev
                readOnly: true
            - name: gcloud
              secret:
                secretName: backup-google-service-account
                defaultMode: 0420

          containers:
            - name: backup
              image: gitlab-registry.nrp-nautilus.io/prp/synapse/backup
              imagePullPolicy: Always
              command:
                - bash
                - -c
                - |
                  set -euo pipefail
                  DATE=$(date +%Y-%m-%d)
                  BACKUP=/tmp/backup-grafana-dev-${DATE}.db.gpg

                  echo "=== Grafana SQLite backup ${DATE} ==="

                  # python3 sqlite3.backup() creates a consistent point-in-time
                  # snapshot of the live SQLite DB without needing to stop Grafana.
                  python3 -c "import sqlite3; s=sqlite3.connect('/var/lib/grafana/grafana.db'); d=sqlite3.connect('/tmp/grafana-dev-${DATE}.db'); s.backup(d); d.close(); s.close()"

                  echo "Snapshot created, encrypting..."
                  gpg -e --trust-model always \
                    -r D88AA325 -r 596BFF0A -r 6FB31E6D -r 2D48BF8B \
                    -o "${BACKUP}" "/tmp/grafana-dev-${DATE}.db"

                  echo "Sending to GCS..."
                  rclone copy "${BACKUP}" google-matrix:nautilus-grafana
                  echo "Done — backup uploaded: nautilus-grafana/$(basename ${BACKUP})"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1G
              volumeMounts:
                - name: grafana-data
                  mountPath: /var/lib/grafana
                  readOnly: true
                - name: gcloud
                  mountPath: /root/gcloud
