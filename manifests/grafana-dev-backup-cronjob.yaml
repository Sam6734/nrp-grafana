apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-grafana-dev
  namespace: monitoring
spec:
  schedule: "0 10 * * *"
  concurrencyPolicy: Forbid
  suspend: false
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: grafana-backup
          restartPolicy: Never
          terminationGracePeriodSeconds: 60

          volumes:
            - name: gcloud
              secret:
                secretName: backup-google-service-account
                defaultMode: 0444

          containers:
            - name: backup
              image: google/cloud-sdk:slim
              imagePullPolicy: IfNotPresent
              command:
                - bash
                - -c
                - |
                  set -euo pipefail
                  DATE=$(date +%Y-%m-%d)
                  SNAP=/tmp/grafana-dev-${DATE}.db

                  echo "=== Grafana SQLite backup ${DATE} ==="

                  # Find the running Grafana pod
                  POD=$(kubectl -n monitoring get pod \
                    -l app.kubernetes.io/name=grafana,app.kubernetes.io/instance=grafana-dev \
                    -o jsonpath='{.items[0].metadata.name}')
                  echo "Source pod: ${POD}"

                  # kubectl cp uses exec internally — no PVC mount needed.
                  # WAL-mode SQLite is safe to cp from a live pod.
                  kubectl cp monitoring/${POD}:/var/lib/grafana/grafana.db "${SNAP}"
                  echo "DB copied ($(du -h ${SNAP} | cut -f1))"

                  gcloud auth activate-service-account \
                    --key-file=/var/gcloud/service-account.json
                  gsutil cp "${SNAP}" \
                    gs://nautilus-grafana/backup-grafana-dev-${DATE}.db
                  echo "Done — gs://nautilus-grafana/backup-grafana-dev-${DATE}.db"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              volumeMounts:
                - name: gcloud
                  mountPath: /var/gcloud
