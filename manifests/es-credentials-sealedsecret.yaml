---
# SealedSecret — Elasticsearch basic auth credentials
# Encrypted with cluster sealed-secrets controller; safe to commit to git.
# To re-seal after a password rotation:
#   kubectl create secret generic es-credentials \
#     --namespace monitoring \
#     --from-literal=basicAuthPassword=<new-password> \
#     --dry-run=client -o yaml \
#   | kubeseal --cert sealed-secret.pub --scope strict --format yaml \
#   > manifests/es-credentials-sealedsecret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: es-credentials
  namespace: monitoring
spec:
  encryptedData:
    basicAuthPassword: 
  template:
    metadata:
      name: es-credentials
      namespace: monitoring
