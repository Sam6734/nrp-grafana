apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dev-dashboards
  namespace: argo
  labels:
    app.kubernetes.io/part-of: monitoring
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: default
  source:
    repoURL: https://github.com/Sam6734/nrp-grafana.git
    targetRevision: HEAD
    path: dashboards/configmaps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
